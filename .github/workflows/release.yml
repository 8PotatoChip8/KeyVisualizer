name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
          - os: macos-latest
            platform: darwin
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxt-dev libxrandr-dev dpkg fakeroot

      - name: Generate macOS icon (.icns)
        if: matrix.platform == 'darwin'
        run: |
          mkdir -p icon.iconset
          # Use sips to resize the PNG to all required sizes
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png --out icon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            if [ $double -le 1024 ]; then
              sips -z $double $double assets/icon.png --out icon.iconset/icon_${size}x${size}@2x.png
            fi
          done
          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Generate Windows icon (.ico)
        if: matrix.platform == 'win32'
        run: |
          npm install --no-save png-to-ico
          node -e "
            const pngToIco = require('png-to-ico');
            const fs = require('fs');
            pngToIco(fs.readFileSync('assets/icon.png'))
              .then(buf => fs.writeFileSync('assets/icon.ico', buf))
              .then(() => console.log('icon.ico created'));
          "

      - name: Install dependencies
        run: npm ci

      - name: Build and make distributables
        run: npx electron-forge make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/*.dmg
            out/make/**/*.deb
            out/make/**/*.zip
            out/make/**/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.zip
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
